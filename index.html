<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>報告メール</title>

<style>
body{
  margin:0;
  height:100vh;
  background:linear-gradient(135deg,#dfe4ea,#f5f6fa);
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
}

.mail{
  width:720px;
  background:#fff;
  border-radius:12px;
  box-shadow:0 20px 40px rgba(0,0,0,0.18);
  overflow:hidden;
}

.top{
  background:#2f3542;
  color:white;
  padding:14px 18px;
  font-weight:bold;
}

.row{
  display:flex;
  border-bottom:1px solid #ddd;
  padding:12px 18px;
}

.label{
  width:80px;
  color:#777;
}

.value{
  flex:1;
}

textarea{
  width:100%;
  height:260px;
  border:none;
  padding:18px;
  box-sizing:border-box;
  font-size:16px;
  resize:none;
  outline:none;
}

.footer{
  background:#f1f2f6;
  padding:14px 18px;
  text-align:right;
}

button{
  background:#1e90ff;
  color:white;
  border:none;
  border-radius:6px;
  padding:10px 26px;
  font-size:15px;
  cursor:pointer;
}

button:hover{
  background:#006fd6;
}

#result{
  margin-top:18px;
  padding:14px;
  border-radius:8px;
  text-align:center;
  font-weight:bold;
  display:none;
}

.success{
  background:#e8f8ef;
  color:#1e7e34;
  border:1px solid #8fd19e;
}

.error{
  background:#fdecea;
  color:#b02a37;
  border:1px solid #f5a6a6;
}
</style>
</head>

<body>

<div>
  <div class="mail">
    <div class="top">新規報告メール</div>

    <div class="row">
      <div class="label">To</div>
      <div class="value">investigation@report.local</div>
    </div>

    <div class="row">
      <div class="label">Subject</div>
      <div class="value">調査報告書</div>
    </div>

    <textarea id="answer" placeholder="ここに報告内容を入力してください"></textarea>

    <div class="footer">
      <button onclick="checkAnswer()">送信</button>
    </div>
  </div>

  <div id="result"></div>
</div>

<script>
function checkAnswer(){

  const input = document.getElementById("answer").value.trim();

   const answers = [
        "みたえき",
        "三田駅",
        "MITAEKI",
        "mitaeki"
    ];

  const correct = answers.some(answer =>
    input.includes(answer)
  );

  const result = document.getElementById("result");
  result.style.display = "block";

  if(correct){
    result.className = "success";
    result.innerHTML = "送信完了<br>正しい報告として受理されました。";
  }else{
    result.className = "error";
    result.innerHTML = "送信失敗<br>報告内容を確認できませんでした。";
  }
}
</script>

</body>
</html>
