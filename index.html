<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>報告書</title>
</head>
<style>
body {
    margin: 0;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    text-align: center;
}
</style>
<body>

<input id="answer" type="text">
<button onclick="checkAnswer()">判定</button>

<p id="result"></p>

<script>
function checkAnswer() {
    const input = document.getElementById("answer").value.trim();

    const answers = [
        "みたえき",
        "三田駅",
        "MITAEKI",
        "mitaeki"
    ];

    if (answers.includes(input)) {
        document.getElementById("result").textContent = "なるほど、そこに向かえばいいのか。ありがとう";
    } else {
        document.getElementById("result").textContent = "どうも条件と合わないようだ。もう一度考えてもらえるか？";
    }
}
</script>

</body>
</html>
